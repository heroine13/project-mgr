version: '3.8'

services:
  # Database Services
  db-mysql:
    image: mysql:8.0
    container_name: project-mgr-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: project_mgr
      MYSQL_USER: project_user
      MYSQL_PASSWORD: project_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - project-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      timeout: 5s
      retries: 5

  db-postgres:
    image: postgres:15
    container_name: project-mgr-postgres
    environment:
      POSTGRES_DB: project_mgr
      POSTGRES_USER: project_user
      POSTGRES_PASSWORD: project_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - project-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U project_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: project-mgr-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db-mysql:
        condition: service_healthy
      db-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://project_user:project_password@db-mysql:3306/project_mgr
      POSTGRES_URL: postgresql://project_user:project_password@db-postgres:5432/project_mgr
      SECRET_KEY: dev-secret-key-change-in-production
    networks:
      - project-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: project-mgr-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: /api/v1
    networks:
      - project-network
    command: npm run dev

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: project-mgr-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend
    networks:
      - project-network

  # Redis Cache (optional)
  redis:
    image: redis:7-alpine
    container_name: project-mgr-redis
    ports:
      - "6379:6379"
    networks:
      - project-network

  # Monitoring (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: project-mgr-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - project-network

networks:
  project-network:
    driver: bridge

volumes:
  mysql_data:
  postgres_data: