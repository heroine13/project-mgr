version: '3.8'

services:
  # PostgreSQL数据库
  postgres:
    image: postgres:15
    container_name: project-mgr-postgres
    environment:
      POSTGRES_DB: project_mgr
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: project-mgr-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx 反向代理（可选，生产环境使用）
  nginx:
    image: nginx:alpine
    container_name: project-mgr-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    environment:
      # CORS_ORIGIN: 允许的源域名，开发环境用 *，生产环境填写具体域名
      CORS_ORIGIN: "*"
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    restart: unless-stopped

  # 前端（开发环境）
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: project-mgr-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # Vite 代理后端地址
      VITE_API_BASE_URL: http://backend:8000
      # WebSocket 地址
      VITE_WS_URL: ws://backend:8000
    depends_on:
      - backend
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]

  # FastAPI后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.simple
    container_name: project-mgr-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://admin:admin123@postgres:5432/project_mgr
      REDIS_URL: redis://redis:6379
      SECRET_KEY: development-secret-key-change-in-production
      ENVIRONMENT: development
      # CORS: 逗号分隔的允许域名列表
      BACKEND_CORS_ORIGINS: "http://localhost:5173,http://localhost:8000,http://127.0.0.1:5173"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "
        echo '等待数据库就绪...' &&
        sleep 5 &&
        python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

volumes:
  postgres_data:
