version: '3.8'

# 项目进度管理系统 - 测试环境配置
# 使用方法: docker-compose -f docker-compose-test.yml up -d

services:
  # FastAPI后端 (开发模式 - SQLite)
  backend:
    image: python:3.12-slim
    container_name: project-mgr-backend-test
    working_dir: /app
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      # 使用 SQLite 开发数据库
      DATABASE_URL: sqlite:///./project_mgr.db
      DATABASE_TYPE: sqlite
      ENVIRONMENT: development
      SECRET_KEY: dev-test-secret-key-change-in-production
      DEBUG: "true"
    command: >
      sh -c "
        pip install --no-cache-dir fastapi uvicorn sqlalchemy pydantic pydantic-settings pyjwt cryptography &&
        python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Vue3 前端 (开发模式)
  frontend:
    image: node:20-alpine
    container_name: project-mgr-frontend-test
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    command: >
      sh -c "
        npm install &&
        npm run dev -- --host 0.0.0.0
      "
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5173/"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  default:
    name: project-mgr-test