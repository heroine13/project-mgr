<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎使用项目管理系统</title>
    <style>
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 28px;
        }
        .content {
            padding: 40px;
        }
        .features {
            margin: 30px 0;
        }
        .feature-item {
            padding: 15px;
            margin: 10px 0;
            background: #f8f9fa;
            border-radius: 6px;
            border-left: 4px solid #667eea;
        }
        .btn {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 14px 40px;
            text-decoration: none;
            border-radius: 6px;
            margin-top: 20px;
            font-weight: 500;
            font-size: 16px;
        }
        .footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            color: #7f8c8d;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎉 欢迎使用项目管理系统</h1>
        </div>
        <div class="content">
            <p>您好，<strong>{{ username }}</strong>！</p>
            <p>感谢您注册项目管理系统！我们很高兴为您提供服务。</p>
            
            <div class="features">
                <h3>系统主要功能：</h3>
                <div class="feature-item">📋 项目管理 - 创建和管理项目</div>
                <div class="feature-item">✅ 任务管理 - 分配和跟踪任务</div>
                <div class="feature-item">📊 甘特图 - 可视化项目进度</div>
                <div class="feature-item">💬 实时协作 - 评论和@提及</div>
                <div class="feature-item">📈 数据统计 - 多维度分析</div>
            </div>
            
            <center>
                <a href="{{ login_url }}" class="btn">立即开始使用</a>
            </center>
            
            <p style="margin-top: 30px;">祝您使用愉快！</p>
            <p>—— 项目管理系统团队</p>
        </div>
        <div class="footer">
            <p>此邮件由项目管理系统自动发送，请勿回复。</p>
            <p>&copy; {{ current_year }} 项目管理系统 - 保留所有权利</p>
        </div>
    </div>
</body>
</html>
