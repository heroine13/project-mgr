<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务通知</title>
    <style>
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
        }
        .content {
            padding: 30px;
        }
        .task-card {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 20px;
            margin: 20px 0;
            border-radius: 4px;
        }
        .task-title {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .task-meta {
            color: #7f8c8d;
            font-size: 14px;
        }
        .btn {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 6px;
            margin-top: 20px;
            font-weight: 500;
        }
        .footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            color: #7f8c8d;
            font-size: 12px;
        }
        .highlight {
            color: #667eea;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 任务通知</h1>
        </div>
        <div class="content">
            <p>您好，</p>
            <p><span class="highlight">{{ actor_name }}</span> {{ action_verb }}了一个任务：</p>
            
            <div class="task-card">
                <div class="task-title">{{ task_title }}</div>
                <div class="task-meta">
                    <p>📁 项目: <strong>{{ project_name }}</strong></p>
                    <p>👤 操作人: {{ actor_name }}</p>
                    <p>🕐 时间: {{ action_time }}</p>
                </div>
            </div>
            
            <p>请登录系统查看详情或进行操作。</p>
            
            <center>
                <a href="{{ login_url }}" class="btn">查看任务</a>
            </center>
        </div>
        <div class="footer">
            <p>此邮件由项目管理系统自动发送，请勿回复。</p>
            <p>&copy; {{ current_year }} 项目管理系统 - 保留所有权利</p>
        </div>
    </div>
</body>
</html>
